---
version: 2
project_name: garmin_exporter

before:
  hooks:
    - go mod tidy
    - go mod download

builds:
  - id: garmin_exporter
    binary: garmin_exporter
    main: .
    mod_timestamp: "{{ .CommitTimestamp }}"
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/prometheus/common/version.Version={{ .Version }}
      - -X github.com/prometheus/common/version.Revision={{ .Commit }}
      - -X github.com/prometheus/common/version.Branch={{ .Branch }}
      - -X github.com/prometheus/common/version.BuildDate={{ .Date }}
      - -X github.com/prometheus/common/version.BuildUser=goreleaser

archives:
  - id: tarball
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE
      - README.md

dockers_v2:
  - id: garmin_exporter
    dockerfile: Dockerfile.release
    images:
      - "ghcr.io/barnes-c/garmin_exporter"
      - "docker.io/barnesbiz/garmin_exporter"
    tags:
      - "{{ .Version }}"
      - "latest"
    platforms:
      - linux/amd64
      - linux/arm64
    build_args:
      COMMIT: "{{ .FullCommit }}"
      DATE: "{{ .Date }}"
      VERSION: "{{ .Version }}"

sboms:
  - artifacts: binary

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  sort: asc
  abbrev: -1
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

signs:
  - cmd: cosign
    signature: "${artifact}.bundle"
    args:
      - sign-blob
      - --bundle=${signature}
      - --yes
      - ${artifact}
    artifacts: checksum

docker_signs:
  - cmd: cosign
    artifacts: all
    output: true
    args:
      - sign
      - --yes
      - ${artifact}@${digest}

release:
  github:
    owner: barnes-c
    name: garmin_exporter
  draft: true
  prerelease: auto
  header: |
    ## Garmin Exporter {{ .Tag }}

    ### Container images
    - `ghcr.io/barnes-c/garmin_exporter:{{ .Version }}`
    - `docker.io/barnesbiz/garmin_exporter:{{ .Version }}`

    ### Binaries
    Linux `amd64` / `arm64` tarballs are attached below (`garmin_exporter_{{ .Version }}_linux_*.tar.gz`).

    ### SBOMs
    SPDX SBOMs (`*.sbom.json`) are attached for supply-chain verification.
  footer: |
    ## Verification

    All artifacts are signed with [cosign](https://github.com/sigstore/cosign) keyless signing.

    Verify the checksums bundle:
    ```
    cosign verify-blob \
      --bundle checksums.txt.bundle \
      --certificate-identity-regexp "^https://github.com/barnes-c/garmin_exporter/" \
      --certificate-oidc-issuer https://token.actions.githubusercontent.com \
      checksums.txt
    ```

    Verify a container image:
    ```
    cosign verify ghcr.io/barnes-c/garmin_exporter:{{ .Version }} \
      --certificate-identity-regexp "^https://github.com/barnes-c/garmin_exporter/" \
      --certificate-oidc-issuer https://token.actions.githubusercontent.com
    ```
