---
version: 2
project_name: garmin-exporter

before:
  hooks:
    - go mod tidy
    - go mod download

builds:
  - id: garmin-exporter
    binary: garmin-exporter
    main: .
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/prometheus/common/version.Version={{ .Version }}
      - -X github.com/prometheus/common/version.Revision={{ .Commit }}
      - -X github.com/prometheus/common/version.Branch={{ .Branch }}
      - -X github.com/prometheus/common/version.BuildDate={{ .Date }}
      - -X github.com/prometheus/common/version.BuildUser=goreleaser

archives:
  - id: tarball
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md

dockers_v2:
  - id: garmin-exporter
    dockerfile: Dockerfile.release
    images:
      - "ghcr.io/barnes-c/garmin-exporter"
      - "docker.io/barnesbiz/garmin-exporter"
    tags:
      - "{{ .Version }}"
      - "latest"
    platforms:
      - linux/amd64
      - linux/arm64
    build_args:
      COMMIT: "{{ .FullCommit }}"
      DATE: "{{ .Date }}"
      VERSION: "{{ .Version }}"

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  sort: asc
  abbrev: -1
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

signs:
  - cmd: cosign
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - --oidc-issuer=https://token.actions.githubusercontent.com
      - --output-signature=${signature}
      - --output-certificate=${certificate}
      - --yes
      - ${artifact}
    artifacts: checksum

docker_signs:
  - cmd: cosign
    artifacts: all
    output: true
    args:
      - sign
      - --oidc-issuer=https://token.actions.githubusercontent.com
      - --yes
      - ${artifact}

release:
  github:
    owner: barnes-c
    name: garmin-exporter
  draft: true
  prerelease: auto
