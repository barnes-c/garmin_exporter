---
name: Release
on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    outputs:
      hashes: ${{ steps.hashes.outputs.hashes }}
      ghcr-digest: ${{ steps.images.outputs.ghcr-digest }}
      dockerhub-digest: ${{ steps.images.outputs.dockerhub-digest }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: 1.26.x

      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v2.5.0

      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --config .github/.goreleaser.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest container SBOMs
        run: |
          set -euo pipefail
          jq -r '[.[] | select(.type=="Docker Image")] | group_by((.name | split(":")[0]) + "@" + .extra.Digest) | .[] | .[0] | "\(.name|split(":")[0]) \(.extra.Digest)"' dist/artifacts.json \
            | while read -r repo digest; do
                [ -z "$repo" ] && continue
                ref="${repo}@${digest}"
                echo "::group::SBOM for $ref"
                syft -q "$ref" -o spdx-json=sbom.spdx.json
                cosign attest --type spdxjson --predicate sbom.spdx.json --yes "$ref"
                echo "::endgroup::"
              done

      - name: Aggregate binary/package hashes for SLSA
        id: hashes
        run: |
          set -euo pipefail
          cd dist
          files=$(jq -r '.[] | select(.type=="Archive") | .path' artifacts.json | sed 's|^dist/||')
          echo "$files" | xargs sha256sum | base64 -w0 > hashes.b64
          echo "hashes=$(cat hashes.b64)" >> "$GITHUB_OUTPUT"

      - name: Extract image digests
        id: images
        run: |
          set -euo pipefail
          ghcr=$(jq -r '.[] | select(.type=="Docker Image" and (.name|startswith("ghcr.io/"))) | .extra.Digest' dist/artifacts.json | head -n1)
          hub=$(jq -r '.[] | select(.type=="Docker Image" and (.name|startswith("docker.io/"))) | .extra.Digest' dist/artifacts.json | head -n1)
          echo "ghcr-digest=${ghcr}" >> "$GITHUB_OUTPUT"
          echo "dockerhub-digest=${hub}" >> "$GITHUB_OUTPUT"

  slsa-binaries:
    needs: goreleaser
    permissions:
      id-token: write
      contents: write
      actions: read
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.goreleaser.outputs.hashes }}
      upload-assets: true
      draft-release: true

  slsa-ghcr:
    needs: goreleaser
    permissions:
      id-token: write
      packages: write
      contents: read
      actions: read
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0
    with:
      image: ghcr.io/barnes-c/garmin_exporter
      digest: ${{ needs.goreleaser.outputs.ghcr-digest }}
      registry-username: ${{ github.actor }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}

  slsa-dockerhub:
    needs: goreleaser
    permissions:
      id-token: write
      packages: write
      contents: read
      actions: read
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0
    with:
      image: docker.io/barnesbiz/garmin_exporter
      digest: ${{ needs.goreleaser.outputs.dockerhub-digest }}
    secrets:
      registry-username: ${{ secrets.DOCKERHUB_USERNAME }}
      registry-password: ${{ secrets.DOCKERHUB_TOKEN }}
